name: CI/CD — Infrastructure (Terraform)

on:
  push:
    branches: [master, main]
    paths:
      - "infrastructure/terraform/**"
  pull_request:
    branches: [master, main]
    paths:
      - "infrastructure/terraform/**"

concurrency:
  group: terraform-production
  cancel-in-progress: false

permissions:
  id-token:      write
  contents:      read
  pull-requests: write   # כדי לכתוב terraform plan כ-PR comment

env:
  TF_WORKING_DIR: infrastructure/terraform/environments/production
  AWS_REGION:     us-east-1

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: Validate & Format
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # terraform fmt -check: נכשל אם ה-code לא מפורמט
          # מאלץ את כל הצוות לכתוב code אחיד
          terraform fmt -check -recursive

      - name: Terraform Init (validate only)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # tfsec: static analysis לsecurity issues ב-Terraform
      - name: Security scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          soft_fail: false

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: Plan — מה Terraform מתכוון לשנות
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      # ─── PR Comment עם תוצאות ה-plan ──────────────────────────────────────
      # כל מי שמסתכל ב-PR רואה בדיוק מה Terraform יעשה
      # זה חיוני ל-code review של תשתית
      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8');
            const MAX = 60000;
            const body = plan.length > MAX
              ? plan.substring(0, MAX) + '\n...(truncated)'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${body}\n\`\`\``
            });

      # שמור את ה-plan כ-artifact כדי שה-apply job ישתמש בו
      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3: Apply — רץ רק על main, לאחר approval
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    environment:
      name: production   # דורש approval ידני ב-GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # מריץ בדיוק את ה-plan שאושר — לא plan חדש
          terraform apply -input=false tfplan
