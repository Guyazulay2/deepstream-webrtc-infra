apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name:      external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: deepstream-webrtc-secrets
  namespace: deepstream-webrtc
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: deepstream-webrtc-secrets
    creationPolicy: Owner
  data:
    - secretKey: TURN_HOST
      remoteRef:
        key: deepstream-webrtc/turn
        property: host
    - secretKey: TURN_SECRET
      remoteRef:
        key: deepstream-webrtc/turn
        property: secret
