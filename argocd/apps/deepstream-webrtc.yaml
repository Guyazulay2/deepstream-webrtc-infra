apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deepstream-webrtc
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: deployments
spec:
  project: default

  source:
    repoURL:        https://github.com/Guyazulay2/webrtc_droneV2.git
    targetRevision: HEAD
    path:           helm/deepstream-webrtc
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml

  destination:
    server:    https://kubernetes.default.svc
    namespace: deepstream-webrtc

  syncPolicy:
    automated:
      prune:    true    # delete resources removed from helm chart
      selfHeal: true    # auto-revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration:    5s
        factor:      2
        maxDuration: 3m
